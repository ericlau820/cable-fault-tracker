<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>
  
  <!-- Map outline -->
  <path d="M80 400 L120 120 L200 180 L280 100 L360 160 L432 90 L432 400 Z" 
        fill="#e3f2fd" stroke="#3498db" stroke-width="4"/>
  
  <!-- Cable path -->
  <path d="M100 350 Q180 300 200 220 Q220 150 300 180 Q380 210 400 150" 
        fill="none" stroke="#e67e22" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Tracking dots along the path -->
  <circle cx="100" cy="350" r="8" fill="#3498db"/>
  <circle cx="150" cy="320" r="8" fill="#3498db"/>
  <circle cx="200" cy="220" r="8" fill="#3498db"/>
  <circle cx="250" cy="180" r="8" fill="#3498db"/>
  <circle cx="300" cy="180" r="8" fill="#3498db"/>
  <circle cx="350" cy="190" r="8" fill="#3498db"/>
  <circle cx="400" cy="150" r="8" fill="#3498db"/>
  
  <!-- Fault marker -->
  <g transform="translate(300, 180)">
    <polygon points="0,-40 10,-15 40,-15 15,5 25,35 0,15 -25,35 -15,5 -40,-15 -10,-15" 
             fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="30" font-weight="bold" fill="white">!</text>
  </g>
  
  <!-- User location marker -->
  <circle cx="400" cy="150" r="15" fill="#27ae60" stroke="white" stroke-width="3"/>
  
  <!-- App name text -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="36" font-weight="bold" fill="#2c3e50">Cable Tracker</text>
</svg>